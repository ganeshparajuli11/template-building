name: Feature request
description: Suggest an improvement for OPEDS
title: "feature: "
labels: ["feature", "enhancement", "priority:medium"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point are you facing?
      placeholder: As a user, I want ... because ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be built?
      placeholder: Describe behavior, UI, and expected outcome
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other approaches you thought about
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - High business impact
        - Medium business impact
        - Low business impact
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend
        - Security
        - SEO
        - Dashboard
        - Operations
    validations:
      required: true
