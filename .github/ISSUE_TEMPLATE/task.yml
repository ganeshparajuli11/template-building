name: Task
description: Create an internal engineering task
title: "task: "
labels: ["enhancement", "priority:low"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      placeholder: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: textarea
    id: technical
    attributes:
      label: Technical notes
      placeholder: Dependencies, constraints, related files
  - type: input
    id: estimate
    attributes:
      label: Time estimate
      placeholder: eg 2h, 1d, 3d
