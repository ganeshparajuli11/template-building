name: Sync Labels

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/labels.yml

permissions:
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure repository labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'bug', color: 'd73a4a', description: 'Something is not working' },
              { name: 'feature', color: '0e8a16', description: 'New feature or request' },
              { name: 'enhancement', color: 'a2eeef', description: 'Improvement to existing behavior' },
              { name: 'question', color: 'd876e3', description: 'Further information is requested' },
              { name: 'security', color: 'b60205', description: 'Security related issue' },
              { name: 'documentation', color: '0075ca', description: 'Documentation improvements' },
              { name: 'frontend', color: '1d76db', description: 'Frontend related work' },
              { name: 'backend', color: '5319e7', description: 'Backend related work' },
              { name: 'seo', color: 'fbca04', description: 'SEO related work' },
              { name: 'ui-ux', color: 'c2e0c6', description: 'UI and UX work' },
              { name: 'good first issue', color: '7057ff', description: 'Good for new contributors' },
              { name: 'help wanted', color: '008672', description: 'Extra attention is needed' },
              { name: 'priority:high', color: 'b60205', description: 'High priority work' },
              { name: 'priority:medium', color: 'fbca04', description: 'Medium priority work' },
              { name: 'priority:low', color: '0e8a16', description: 'Low priority work' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });

                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                } else {
                  throw error;
                }
              }
            }
