name: Stale Issues and PRs

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale items
        uses: actions/stale@v9
        with:
          stale-issue-message: "This issue has been inactive for 30 days. Please update it or it will be closed in 7 days."
          stale-pr-message: "This PR has been inactive for 21 days. Please update it or it will be closed in 7 days."
          close-issue-message: "Closing due to inactivity. Reopen anytime with updated context."
          close-pr-message: "Closing due to inactivity. Reopen anytime with updates."
          days-before-issue-stale: 30
          days-before-pr-stale: 21
          days-before-issue-close: 7
          days-before-pr-close: 7
          exempt-issue-labels: "pinned,security,critical,blocked"
          exempt-pr-labels: "pinned,security,critical,work-in-progress"
