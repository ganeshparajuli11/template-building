name: CI → Auto-merge hero-section to main

on:
  push:
    branches:
      - hero-section

jobs:
  build-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Merge hero-section into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- .
          git clean -fd public/sitemap*.xml public/robots.txt
          git checkout main
          git merge hero-section --no-ff -m "chore: auto-merge hero-section → main [CI passed]"
          git push origin main
