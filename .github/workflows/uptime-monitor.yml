name: Uptime Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    if: ${{ vars.PRODUCTION_URL != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      URL: ${{ vars.PRODUCTION_URL }}
      ISSUE_TITLE: "[monitor] Production uptime alert"
    steps:
      - name: Check endpoint
        id: check
        run: |
          set +e
          code=$(curl -L --max-time 20 --silent --output /dev/null --write-out "%{http_code}" "$URL")
          echo "http_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then
            echo "status=up" >> "$GITHUB_OUTPUT"
          else
            echo "status=down" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update downtime issue
        if: steps.check.outputs.status == 'down'
        uses: actions/github-script@v7
        env:
          HTTP_CODE: ${{ steps.check.outputs.http_code }}
        with:
          script: |
            const title = process.env.ISSUE_TITLE;
            const body = [
              'Automated uptime monitor detected a failure.',
              '',
              `- URL: ${process.env.URL}`,
              `- HTTP status: ${process.env.HTTP_CODE}`,
              `- Time (UTC): ${new Date().toISOString()}`,
              '',
              'Action: investigate deployment, logs, DNS, and external dependency status.'
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bug', 'priority:high']
              });
            }

      - name: Close downtime issue when recovered
        if: steps.check.outputs.status == 'up'
        uses: actions/github-script@v7
        env:
          HTTP_CODE: ${{ steps.check.outputs.http_code }}
        with:
          script: |
            const title = process.env.ISSUE_TITLE;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: [
                  'Uptime monitor reports recovery.',
                  '',
                  `- URL: ${process.env.URL}`,
                  `- HTTP status: ${process.env.HTTP_CODE}`,
                  `- Time (UTC): ${new Date().toISOString()}`
                ].join('\n')
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed'
              });
            }
